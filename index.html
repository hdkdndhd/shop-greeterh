<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<meta name="description" content="Shop Greeter - camera se person detect karke automatic audio greeting bajata hai.">
<title>Shop Greeter · Person Detector</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:      #0b0f14;
    --panel:   #131a22;
    --line:    #223140;
    --text:    #e8eef4;
    --dim:     #7d8fa0;
    --accent:  #35c2a0;
    --accent2: #ff8a3d;
    --danger:  #e05a5a;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    overflow:hidden;
  }
  .app{
    position:relative; width:100vw; height:100vh;
    display:flex; flex-direction:column;
  }

  header{
    padding:14px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:5;
  }
  header h1{
    font-size:16px; margin:0; font-weight:700; letter-spacing:0.01em;
  }
  .badge{
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:0.06em;
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--danger); }
  .dot.live{ background:var(--accent); box-shadow:0 0 0 4px rgba(53,194,160,0.18); }

  .camera-wrap{
    position:relative; flex:1; margin:0 14px 14px;
    border-radius:16px; overflow:hidden;
    background:#000;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  video{
    width:100%; height:100%; object-fit:cover;
    transform:scaleX(-1);
    display:block;
  }
  .placeholder{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--dim); text-align:center; padding:20px;
  }
  .placeholder svg{ width:46px; height:46px; opacity:0.5; }
  .placeholder small{ font-size:12px; max-width:240px; line-height:1.5; }

  .overlay-status{
    position:absolute; left:12px; bottom:12px; right:12px;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .pill{
    background:rgba(11,15,20,0.72);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    padding:9px 18px;
    font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:8px;
    max-width:100%;
  }
  .pill .pdot{ width:7px; height:7px; border-radius:50%; background:var(--dim); flex-shrink:0; }
  .pill.present .pdot{ background:var(--accent2); }
  .pill.greeted .pdot{ background:var(--accent); }

  footer{
    padding:8px 18px calc(20px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:10px;
    z-index:5;
  }
  #statusText{
    font-size:13px; color:var(--dim); text-align:center; min-height:18px;
  }
  .controls{ display:flex; align-items:center; gap:16px; }

  #toggleBtn{
    width:76px; height:76px; border-radius:50%;
    border:none; cursor:pointer;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 22px rgba(53,194,160,0.35);
    transition:transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  #toggleBtn:active{ transform:scale(0.92); }
  #toggleBtn.running{
    background:var(--danger);
    box-shadow:0 6px 22px rgba(224,90,90,0.35);
  }
  #toggleBtn svg{ width:28px; height:28px; }

  #testBtn{
    width:46px; height:46px; border-radius:50%;
    background:var(--panel); border:1px solid var(--line);
    color:var(--text); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #testBtn svg{ width:18px; height:18px; }

  .caption{ font-size:11px; color:var(--dim); letter-spacing:0.03em; }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Shop Greeter</h1>
    <div class="badge"><span class="dot" id="liveDot"></span><span id="liveLabel">Band</span></div>
  </header>

  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="14" height="12" rx="2"/><path d="M17 10l4-2v8l-4-2"/><circle cx="10" cy="13" r="3"/></svg>
      <small id="placeholderText">Camera shuru karne ke liye neeche button dabayein</small>
    </div>
    <div class="overlay-status">
      <div class="pill" id="detectPill"><span class="pdot"></span><span id="detectText">Nishkriya</span></div>
    </div>
  </div>

  <footer>
    <div id="statusText">Shuru karne ke liye tap karein</div>
    <div class="controls">
      <button id="testBtn" title="Test beep" aria-label="Test beep">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 6l7-4v20l-7-4H4a1 1 0 01-1-1V11a1 1 0 011-1h5z"/><path d="M17.5 8.5a5 5 0 010 7"/></svg>
      </button>
      <button id="toggleBtn" aria-label="Start / Stop">
        <svg id="toggleIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div style="width:46px;"></div>
    </div>
    <div class="caption">Offline model cache ke baad bina internet bhi chalta hai</div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.15.0/tf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/coco-ssd/2.2.2/coco-ssd.min.js"></script>
<script>
(function(){
  "use strict";

  const video        = document.getElementById('video');
  const placeholder   = document.getElementById('placeholder');
  const placeholderText = document.getElementById('placeholderText');
  const toggleBtn     = document.getElementById('toggleBtn');
  const toggleIcon    = document.getElementById('toggleIcon');
  const testBtn       = document.getElementById('testBtn');
  const statusText     = document.getElementById('statusText');
  const liveDot        = document.getElementById('liveDot');
  const liveLabel      = document.getElementById('liveLabel');
  const detectPill     = document.getElementById('detectPill');
  const detectText     = document.getElementById('detectText');

  const PERSON_CONFIDENCE = 0.55;
  const DETECT_INTERVAL_MS = 300;
  const SECOND_GREETING_DELAY_MS = 3000;

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_STOP = '<rect x="6" y="6" width="12" height="12" rx="2"/>';

  let stream = null;
  let model = null;
  let running = false;
  let detectTimer = null;
  let busy = false;

  let personPresent = false;
  let secondGreetTimer = null;

  let audioCtx = null;

  function setStatus(msg){ statusText.textContent = msg; }

  function ensureAudioCtx(){
    if (!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Short two-tone beep generated purely with the Web Audio API oscillator.
  function playGreeting(loud){
    const ctx = ensureAudioCtx();
    const now = ctx.currentTime;
    const peakGain = loud ? 0.9 : 0.28;
    const notes = [880, 1175]; // pleasant rising chime

    notes.forEach((freq, i) => {
      const start = now + i * 0.16;
      const dur = 0.16;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, start);

      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(peakGain, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + dur + 0.02);
    });
  }

  function setDetectPill(state){
    // state: 'idle' | 'present' | 'greeted'
    detectPill.className = 'pill' + (state === 'idle' ? '' : ' ' + state);
    detectText.textContent = state === 'idle' ? 'Koi vyakti nahi'
      : state === 'present' ? 'Vyakti mila'
      : 'Swagat ho chuka';
  }

  function resetVisitState(){
    personPresent = false;
    if (secondGreetTimer){ clearTimeout(secondGreetTimer); secondGreetTimer = null; }
    setDetectPill('idle');
  }

  function onPersonSeen(){
    if (personPresent) return; // already tracking this visit
    personPresent = true;
    setDetectPill('present');
    playGreeting(false);
    setStatus('Naya vyakti aaya — swagat baja diya');

    secondGreetTimer = setTimeout(() => {
      secondGreetTimer = null;
      if (personPresent){
        playGreeting(true);
        setDetectPill('greeted');
        setStatus('Vyakti abhi bhi hai — dobara (loud) swagat baja diya');
      }
    }, SECOND_GREETING_DELAY_MS);
  }

  function onPersonGone(){
    if (!personPresent) return;
    resetVisitState();
    setStatus('Frame khali — agle vyakti ka intezaar');
  }

  async function detectLoop(){
    if (!running || !model || busy) return;
    busy = true;
    try{
      const predictions = await model.detect(video);
      const personDetected = predictions.some(p => p.class === 'person' && p.score > PERSON_CONFIDENCE);
      if (personDetected) onPersonSeen();
      else onPersonGone();
    }catch(err){
      console.error('detect error', err);
    }finally{
      busy = false;
    }
  }

  async function loadModel(){
    if (model) return model;
    setStatus('AI model load ho raha hai...');
    model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    return model;
  }

  async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  }

  function stopCamera(){
    if (stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.srcObject = null;
  }

  async function start(){
    toggleBtn.disabled = true;
    try{
      ensureAudioCtx();
      setStatus('Camera permission maang rahe hain...');
      await startCamera();
      placeholder.style.display = 'none';

      await loadModel();

      running = true;
      resetVisitState();
      toggleBtn.classList.add('running');
      toggleIcon.innerHTML = ICON_STOP;
      liveDot.classList.add('live');
      liveLabel.textContent = 'Chalu';
      setStatus('Nigrani chalu — vyakti ka intezaar');

      detectTimer = setInterval(detectLoop, DETECT_INTERVAL_MS);
    }catch(err){
      console.error(err);
      setStatus('Error: ' + (err && err.message ? err.message : 'camera/model shuru nahi hua'));
      placeholderText.textContent = 'Camera access nahi mila. Browser permissions check karein.';
      placeholder.style.display = 'flex';
      stopCamera();
    }finally{
      toggleBtn.disabled = false;
    }
  }

  function stop(){
    running = false;
    if (detectTimer){ clearInterval(detectTimer); detectTimer = null; }
    resetVisitState();
    stopCamera();

    toggleBtn.classList.remove('running');
    toggleIcon.innerHTML = ICON_PLAY;
    liveDot.classList.remove('live');
    liveLabel.textContent = 'Band';
    setStatus('Ruk gaya — shuru karne ke liye tap karein');
    placeholderText.textContent = 'Camera shuru karne ke liye neeche button dabayein';
    placeholder.style.display = 'flex';
  }

  toggleBtn.addEventListener('click', () => { running ? stop() : start(); });
  testBtn.addEventListener('click', () => { ensureAudioCtx(); playGreeting(false); });

  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed', err));
    });
  }
})();
</script>
</body>
</html>
